nelmio_cors:
  defaults:
    allow_origin:
      - 'http://localhost:5173' # vite dev
      - 'http://localhost:4173' # vite preview
    allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
    allow_headers: ['Content-Type', 'Authorization']
    max_age: 3600

  paths:
    '^/':
      allow_origin:
        - 'http://localhost:5173'
        - 'http://localhost:4173'
      allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
      allow_headers: ['Content-Type', 'Authorization']
